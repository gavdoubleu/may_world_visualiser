theme: dark_scientific   # filename (without .yaml) inside yaml/themes/ clean_minimal

# Coordinate projection for map display. Omit this block for default (web_mercator).
# type options: 'web_mercator' (default), 'utm'
# Note: UTM display requires an image overlay background. OSM tiles are Web Mercator only.
#
# When using a non-web_mercator projection with a background image, --map-bounds must
# be supplied in WGS84 (geographic degrees) and must correspond to the geographic
# positions of the image's NW and SE pixel corners — not its SW/NE corners.
# For a UTM raster, use pyproj to compute these:
#   from pyproj import Transformer
#   t = Transformer.from_crs("EPSG:<zone_epsg>", "EPSG:4326", always_xy=True)
#   lon_nw, lat_nw = t.transform(utm_x_min, utm_y_max)   # top-left pixel corner
#   lon_se, lat_se = t.transform(utm_x_max, utm_y_min)   # bottom-right pixel corner
#   # --map-bounds "lat_nw,lon_se,lat_se,lon_nw"  (north,east,south,west)
projection:
  type: utm
  zone: 30

geo_unit_names:
  enabled: true
  csv_path: "data/Geo_unit_names.csv"   # relative to project root
  id_column: "MBD_Temp_ID"
  name_column: "Name"
