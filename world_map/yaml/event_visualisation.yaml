# =============================================================================
# DISPLAY SETTINGS
# =============================================================================
# Uses same keywords as info_panel_config.yaml marker_styles for consistency
display:
  # Default mode: 'choropleth' (colored circles by count) or 'markers' (uniform color, sized by count)
  default_mode: "choropleth"

  # Choropleth settings (count-based coloring)
  choropleth:
    # Size configuration
    size:
      method: "sqrt"        # 'sqrt', 'log', 'linear'
      min_radius: 2         # Minimum marker radius in pixels
      max_radius: 7        # Maximum marker radius in pixels
      scale: 0.5            # Scaling multiplier

    # Border styling
    border:
      color: "#333333"
      width: 1
      opacity: 0.8

    # Fill opacity
    fill_opacity: 0.7

    # Label settings
    show_labels: true
    label_font_size: 10

  # Marker settings (single color per event type, sized by count)
  markers:
    # Size configuration
    size:
      method: "sqrt"        # 'sqrt', 'log', 'linear'
      min_radius: 5         # Minimum marker radius in pixels
      max_radius: 40        # Maximum marker radius in pixels
      scale: 1.5            # Scaling multiplier

    # Border styling
    border:
      color: "#ffffff"
      width: 2
      opacity: 1

    # Fill opacity
    fill_opacity: 0.6

  # Zoom scaling settings (markers scale as map zooms in/out)
  # Same structure as info_panel_config.yaml marker_styles.geo_unit.zoom_scaling
  zoom_scaling:
    # Enable/disable zoom-based radius scaling
    enabled: true
    # Reference zoom level where markers appear at their base size
    base_zoom: 1
    # Scaling exponent (higher = more aggressive scaling)
    # 0.5 = moderate scaling, 1.0 = proportional to zoom
    scale_exponent: 0.5
    # Minimum scale factor (prevents markers from disappearing when zoomed out)
    min_scale: 0.3
    # Maximum scale factor (prevents markers from becoming too large when zoomed in)
    max_scale: 1.5

# =============================================================================
# AGGREGATION SETTINGS
# =============================================================================
aggregation:
  # How to aggregate counts: 'count' or 'rate' (per N population)
  method: "count"
  # Population denominator for rate calculation
  rate_per: 100000
  # Whether to show cumulative totals (from start) or windowed counts
  cumulative: false

# =============================================================================
# LEGEND SETTINGS
# =============================================================================
legend:
  # Position on map: 'topright', 'topleft', 'bottomright', 'bottomleft'
  position: "bottomright"
  # Show threshold labels in legend
  show_threshold_labels: true
  # Show total counts in legend
  show_totals: true
  # Legend title
  title: "Event Counts"

# =============================================================================
# ANIMATION SETTINGS
# =============================================================================
animation:
  # Duration for color/size transitions (ms)
  transition_duration: 300
  # Duration for fade in/out (ms)
  fade_duration: 200
  # Easing function: 'linear', 'ease', 'ease-in', 'ease-out'
  easing: "ease-out"

# =============================================================================
# POPUP SETTINGS
# =============================================================================
popup:
  # Fields to show in event popups
  show_count: true
  show_rate: true
  show_geo_unit_name: true
  # Date format for time display
  date_format: "Day {time}"
