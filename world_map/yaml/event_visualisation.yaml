# Event Visualisation Configuration
# ==================================
# Defines colors, symbols, and display settings for simulation events on the world map
#
# Color Selection:
# ----------------
# Colors can be determined in two ways:
#   1. 'thresholds' - Absolute count-based thresholds (recommended for comparing across time)
#   2. 'gradient' with 'scaling: relative' - Relative to current max value (dynamic scaling)
#
# Example threshold config:
#   thresholds:
#     - max_count: 10      # counts 0-10
#       color: "#fee5d9"
#     - max_count: 50      # counts 11-50
#       color: "#fcae91"
#     - max_count: null    # counts > 50 (null = no upper limit)
#       color: "#cb181d"

# =============================================================================
# TIME SETTINGS
# =============================================================================
time:
  # Time step for aggregation (in simulation time units, typically days)
  aggregation_window: 1.0
  # Playback speed (ms between frames when playing)
  playback_interval_ms: 500
  # Default time window to show (days before current time)
  rolling_window_days: 1

# =============================================================================
# EVENT TYPE CONFIGURATIONS
# =============================================================================
# Each event type can have its own color scheme and display settings

event_types:

  # ---------------------------------------------------------------------------
  # INFECTIONS
  # ---------------------------------------------------------------------------
  infections:
    label: "Infections"
    description: "New infection events"
    default_visible: true
    icon: "virus"

    # Marker styling (used in 'markers' display mode)
    # Uses same keywords as info_panel_config.yaml for consistency
    marker:
      color: "#FFE4E1"
      border:
        color: "#ffffff"
        width: 2
        opacity: 0.8
      fill_opacity: 0.8
      size_scale: 0.5       # Multiplier applied to base radius for this event type

    # Color thresholds based on absolute count values
    # Colors are applied when count <= max_count (checked in order)
    # Use null for the final threshold to catch all remaining values
    color_thresholds:
      - max_count: 2
        color: "#FFA500"
        label: "Very Low"
      - max_count: 5
        color: "#FF8C00"
        label: "Low"
      - max_count: 10
        color: "#FF6347"
        label: "Medium"
      - max_count: 20
        color: "#FF4500"
        label: "High"
      - max_count: null
        color: "#B22222"
        label: "Very High"

    # Alternative: relative gradient (colors scale to current max value)
    # Set 'use_relative_scaling: true' to use this instead of thresholds
    use_relative_scaling: false
    gradient:
      low: "#fee5d9"
      medium: "#fcae91"
      high: "#fb6a4a"
      very_high: "#cb181d"

  # ---------------------------------------------------------------------------
  # DEATHS
  # ---------------------------------------------------------------------------
  deaths:
    label: "Deaths"
    description: "Death events"
    default_visible: true
    icon: "skull"

    marker:
      color: "#2c3e50"
      border:
        color: "#ffffff"
        width: 2
        opacity: 0.9
      fill_opacity: 0.9
      size_scale: 0.8

    color_thresholds:
      - max_count: 1
        color: "#d9d9d9"
        label: "Very Low"
      - max_count: 5
        color: "#969696"
        label: "Low"
      - max_count: 15
        color: "#525252"
        label: "Medium"
      - max_count: 30
        color: "#252525"
        label: "High"
      - max_count: null
        color: "#000000"
        label: "Very High"

    use_relative_scaling: false
    gradient:
      low: "#d9d9d9"
      medium: "#969696"
      high: "#525252"
      very_high: "#252525"

