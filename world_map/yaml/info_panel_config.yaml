# =============================================================================
# MARKER STYLES
# =============================================================================
# Controls how markers are rendered on the map
# Uses same keywords as event_visualisation.yaml for consistency

marker_styles:

  # Geo unit circle markers (population markers)
  geo_unit:
    # Size configuration
    size:
      method: "sqrt"      # 'sqrt', 'log', 'linear'
      # sqrt formula: radius = sqrt(population / characteristic_population) * scale
      characteristic_population: 100  # Population at which sqrt(pop/char_pop) = 1; tune to typical manor size
      min_radius: 3       # Minimum marker radius in pixels
      max_radius: 15      # Maximum marker radius in pixels
      scale: 5            # Scaling multiplier; radius at characteristic_population = scale

    # Color based on population thresholds
    color:
      method: "threshold"  # 'threshold', 'gradient'
      thresholds:
        - value: 100
          color: "#FFFFFF"
        - value: 500
          color: "#FFFFF0"
        - value: 1000
          color: "#FFFFE0"
        - value: 5000
          color: "#FAFAD2"
        - value: 10000
          color: "#FFF5EE"
        - value: null  # Anything above (null = no upper limit)
          color: "#FFE4E1"

    # Border styling
    border:
      color: "#808080"
      width: 1
      opacity: 1

    # Fill opacity
    fill_opacity: 0.7

    # Zoom scaling (markers scale as map zooms in/out)
    zoom_scaling:
      enabled: true
      # Reference zoom level where markers appear at their base size
      base_zoom: 1
      # Scaling exponent (higher = more aggressive scaling)
      # 0.5 = moderate scaling, 1.0 = proportional to zoom
      scale_exponent: 0.7
      # Minimum scale factor (prevents markers from disappearing when zoomed out)
      min_scale: 0.3
      # Maximum scale factor (prevents markers from becoming too large when zoomed in)
      max_scale: 1.0

  # Venue markers
  venue:
    # Size configuration
    size:
      radius: 3           # Fixed radius for venue markers

    # Fill opacity
    fill_opacity: 0.8

    # Color by venue type
    colors:
      school: "#e74c3c"
      hospital: "#3498db"
      university: "#9b59b6"
      company: "#f39c12"
      household: "#2ecc71"
      land: "#8B4513"
      church: "#9932CC"
      market: "#FF6347"
      default: "#95a5a6"

    # Border styling
    border:
      color: "#ffffff"
      width: 1
      opacity: 1

    # Zoom scaling for venue markers
    zoom_scaling:
      enabled: true
      base_zoom: 6
      scale_exponent: 0.5
      min_scale: 0.3
      max_scale: 3.0

# =============================================================================
# DISPLAY OPTIONS
# =============================================================================

display:
  # Number formatting
  number_format:
    use_thousands_separator: true
    decimal_places: 1

  # Chart defaults
  charts:
    bar_height: 20
    max_bar_width: 100
    show_values: true
    show_percentages: true

  # Panel behavior
  panel:
    width: 400
    animation: "slide"  # 'slide', 'fade', 'none'
    close_on_map_click: false
