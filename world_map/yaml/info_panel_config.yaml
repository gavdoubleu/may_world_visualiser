# Info Panel Configuration
# ==========================
# This file controls what attributes are displayed in the map info panels
# when clicking on geographical units, venues, or other map elements.
#
# To customize the display:
# 1. Enable/disable sections by setting 'enabled: true/false'
# 2. Add/remove fields from each section
# 3. Reorder fields to change display order
#
# Field types:
#   - 'attribute': Direct attribute from the data (e.g., 'population', 'name')
#   - 'computed': Computed from multiple attributes (e.g., 'population_density')
#   - 'distribution': Shows a bar chart distribution (e.g., 'age_distribution')
#   - 'breakdown': Shows counts by category (e.g., 'venue_types')
#   - 'list': Shows a list of items (e.g., 'venue_details')

# =============================================================================
# GEOGRAPHICAL UNIT INFO PANEL
# =============================================================================
# Displayed when clicking on a geo_unit circle marker

geo_unit_panel:
  title_field: "name"  # Which field to use as the panel title

  # Quick info shown in popup (before clicking "View Details")
  popup:
    enabled: true
    fields:
      - name: "name"
        label: "Name"
        type: "attribute"
      - name: "level"
        label: "Level"
        type: "attribute"
      - name: "population"
        label: "Population"
        type: "attribute"
        format: "number"  # Adds thousand separators
      - name: "venues_count"
        label: "Venues"
        type: "attribute"

  # Detailed info panel sections (shown when clicking "View Details")
  detail_sections:

    # Basic Info Grid
    - name: "basic_info"
      title: null  # No title for basic info grid
      type: "grid"
      enabled: true
      fields:
        - name: "level"
          label: "Level"
          type: "attribute"
        - name: "population"
          label: "Population"
          type: "attribute"
          format: "number"
        - name: "venues_count"
          label: "Venues"
          type: "attribute"
        - name: "children_count"
          label: "Children Units"
          type: "computed"
          source: "children.length"

    # Age Distribution Chart
    - name: "age_distribution"
      title: "Age Distribution"
      type: "distribution"
      enabled: true
      source: "age_distribution"
      show_percentage: true

    # Sex Distribution Chart
    - name: "sex_distribution"
      title: "Sex Distribution"
      type: "distribution"
      enabled: true
      source: "sex_distribution"
      show_percentage: true

    # Activity Breakdown
    - name: "activity_breakdown"
      title: "Activity Breakdown"
      type: "distribution"
      enabled: true
      source: "activity_counts"
      denominator_field: "population"
      sort_by: "count"
      show_percentage: true

    # Venue Types Breakdown
    - name: "venue_breakdown"
      title: "Venue Types"
      type: "breakdown"
      enabled: true
      source: "venue_types"
      sort_by: "count"  # 'count', 'name', or 'none'
      sort_order: "desc"
      max_items: 20

    # Venue Details List
    - name: "venue_list"
      title: "Venues"
      type: "list"
      enabled: false
      source: "venue_details"
      max_items: 50
      fields:
        - name: "type"
          label: "Type"
        - name: "name"
          label: "Name"

    # Custom Properties (from geo_unit.properties)
    - name: "custom_properties"
      title: "Additional Properties"
      type: "properties"
      enabled: false  # Enable if you have custom properties to show
      exclude:
        - "internal_id"  # Properties to exclude from display

    # People section - click to view list of people in this geo unit
    - name: "people"
      title: "People"
      type: "people"
      enabled: false
      show_count: true
      show_button: true
      button_text: "View People List"

